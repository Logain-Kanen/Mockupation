<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLICK AND HOLD TEST</title>
  </head>
  <body>
    <div>
      <p id="alert1"></p>
      <video
        id="crack1"
        src="video.mp4"
        onmousedown="startVideo(1)"
        onmouseup="stopVideo(1)"
        width="300px"
      ></video>
    </div>
    <div>
      <p id="alert2"></p>
      <video
        id="crack2"
        src="video.mp4"
        onmousedown="startVideo(2)"
        onmouseup="stopVideo(2)"
        width="300px"
      ></video>
    </div>
    <div>
      <p id="alert3"></p>
      <video
        id="crack3"
        src="video.mp4"
        onmousedown="startVideo(3)"
        onmouseup="stopVideo(3)"
        width="300px"
      ></video>
    </div>
    <div>
      <p id="alert4"></p>
      <video
        id="crack4"
        src="video.mp4"
        onmousedown="startVideo(4)"
        onmouseup="stopVideo(4)"
        width="300px"
      ></video>
    </div>
    <div>
      <p id="alert5"></p>
      <video
        id="crack5"
        src="video.mp4"
        onmousedown="startVideo(5)"
        onmouseup="stopVideo(5)"
        width="300px"
      ></video>
    </div>
    <script>
      let filled1 = 0,
        filled2 = 0,
        filled3 = 0,
        filled4 = 0,
        filled5 = 0;
      function startVideo(crack) {
        if (crack == 1) {
          document.getElementById("crack1").play();
          let interval = setInterval(() => {
            if (filled1 === 2) {
              clearInterval(interval);
              document.getElementById("alert1").textContent = "DONE";
            } else {
              filled1++;
            }
          }, 1000);
        }
        if (crack == 2) {
          document.getElementById("crack2").play();
          let interval = setInterval(() => {
            if (filled2 === 2) {
              clearInterval(interval);
              document.getElementById("alert2").textContent = "DONE";
            } else {
              filled2++;
            }
          }, 1000);
        }
        if (crack == 3) {
          document.getElementById("crack3").play();
          let interval = setInterval(() => {
            if (filled3 === 2) {
              clearInterval(interval);
              document.getElementById("alert3").textContent = "DONE";
            } else {
              filled3++;
            }
          }, 1000);
        }
        if (crack == 4) {
          document.getElementById("crack4").play();
          let interval = setInterval(() => {
            if (filled4 === 2) {
              clearInterval(interval);
              document.getElementById("alert4").textContent = "DONE";
            } else {
              filled4++;
            }
          }, 1000);
        }
        if (crack == 5) {
          document.getElementById("crack1").play();
          let interval = setInterval(() => {
            if (filled5 === 2) {
              clearInterval(interval);
              document.getElementById("alert5").textContent = "DONE";
            } else {
              filled5++;
            }
          }, 1000);
        }
      }
      function stopVideo(crack) {
        if (crack == 1) document.getElementById("crack1").pause();
        if (crack == 2) document.getElementById("crack2").pause();
        if (crack == 3) document.getElementById("crack3").pause();
        if (crack == 4) document.getElementById("crack4").pause();
        if (crack == 5) document.getElementById("crack5").pause();
      }
    </script>
  </body>
</html>
